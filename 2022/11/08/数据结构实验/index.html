            <h2 id="实验一"><a href="#实验一" class="headerlink" title="实验一"></a>实验一</h2><blockquote>
<p>一元多项式求导</p>
</blockquote>
<figure class="highlight c++"><table><tr><td class="code"><pre><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">线性结构---实验一</span></span><br><span class="line"><span class="comment">尾插法和前插法</span></span><br><span class="line"><span class="comment">单链表</span></span><br><span class="line"><span class="comment">derivative  导数</span></span><br><span class="line"><span class="comment">Sophia</span></span><br><span class="line"><span class="comment">2022.11.01</span></span><br><span class="line"><span class="comment">OK</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&quot;iostream&quot;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&quot;cstdio&quot;</span></span></span><br><span class="line"><span class="keyword">using</span> <span class="keyword">namespace</span> std;</span><br><span class="line"><span class="keyword">typedef</span> <span class="keyword">struct</span> <span class="title class_">node</span>&#123;</span><br><span class="line">    <span class="type">int</span> coefficient;<span class="comment">//系数</span></span><br><span class="line">    <span class="type">int</span> index;<span class="comment">//指数</span></span><br><span class="line">    node *next;</span><br><span class="line">&#125;*Node, node;</span><br><span class="line"><span class="function"><span class="type">void</span> <span class="title">InputAndDerivation</span><span class="params">(Node &amp;H)</span></span>&#123;</span><br><span class="line">    H=<span class="keyword">new</span> node;</span><br><span class="line">    H-&gt;next=<span class="literal">NULL</span>;</span><br><span class="line">    <span class="type">int</span> coefficient;</span><br><span class="line">    <span class="type">int</span> index;</span><br><span class="line">    Node q=<span class="keyword">new</span> node;</span><br><span class="line">    q=H;</span><br><span class="line">    <span class="keyword">while</span>(<span class="number">1</span>)&#123;</span><br><span class="line">        <span class="built_in">scanf</span>(<span class="string">&quot;%d %d&quot;</span>, &amp;coefficient, &amp;index);</span><br><span class="line">        Node p=<span class="keyword">new</span> node;</span><br><span class="line">        coefficient *= index;</span><br><span class="line">        index--;</span><br><span class="line">        p-&gt;coefficient=coefficient;</span><br><span class="line">        p-&gt;index=index;</span><br><span class="line">        p-&gt;next=q-&gt;next;</span><br><span class="line">        q-&gt;next=p;</span><br><span class="line">        q=p;</span><br><span class="line">        <span class="keyword">if</span>(<span class="built_in">getchar</span>()==<span class="string">&#x27;\n&#x27;</span>)</span><br><span class="line">            <span class="keyword">break</span>;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="type">void</span> <span class="title">Output</span><span class="params">(Node H)</span></span>&#123;</span><br><span class="line">    <span class="keyword">if</span>(H-&gt;next==<span class="literal">NULL</span>)  <span class="keyword">return</span>;</span><br><span class="line">    Node p=<span class="keyword">new</span> node;</span><br><span class="line">    p=H-&gt;next;</span><br><span class="line">    <span class="keyword">while</span>(<span class="number">1</span>)&#123;</span><br><span class="line">        <span class="keyword">if</span>(p-&gt;coefficient==<span class="number">0</span>)&#123;</span><br><span class="line">            <span class="keyword">if</span>(H-&gt;next==p)&#123;</span><br><span class="line">                cout&lt;&lt;p-&gt;coefficient&lt;&lt;<span class="string">&quot; &quot;</span>&lt;&lt;p-&gt;index;</span><br><span class="line">                <span class="keyword">break</span>;</span><br><span class="line">            &#125;<span class="keyword">else</span></span><br><span class="line">                <span class="keyword">break</span>;</span><br><span class="line">        &#125;</span><br><span class="line">        cout&lt;&lt;p-&gt;coefficient&lt;&lt;<span class="string">&quot; &quot;</span>&lt;&lt;p-&gt;index;</span><br><span class="line">        <span class="keyword">if</span>(p-&gt;next==<span class="literal">NULL</span>)</span><br><span class="line">            <span class="keyword">break</span>;</span><br><span class="line">        <span class="keyword">if</span>(p-&gt;next != <span class="literal">NULL</span>)</span><br><span class="line">            cout&lt;&lt;<span class="string">&quot; &quot;</span>;</span><br><span class="line">        p=p-&gt;next;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">main</span><span class="params">()</span></span>&#123;</span><br><span class="line">    Node H;</span><br><span class="line">    <span class="built_in">InputAndDerivation</span>(H);</span><br><span class="line">    <span class="built_in">Output</span>(H);</span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>

<h2 id="实验二"><a href="#实验二" class="headerlink" title="实验二"></a>实验二</h2><blockquote>
<p>还原二叉树</p>
</blockquote>
<figure class="highlight c++"><table><tr><td class="code"><pre><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">实验二---还原二叉树</span></span><br><span class="line"><span class="comment">Sophia</span></span><br><span class="line"><span class="comment">2022.11.01</span></span><br><span class="line"><span class="comment"></span></span><br><span class="line"><span class="comment">二叉树存储结构</span></span><br><span class="line"><span class="comment">遍历</span></span><br><span class="line"><span class="comment">OK</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&quot;iostream&quot;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&quot;cstdio&quot;</span></span></span><br><span class="line"><span class="keyword">using</span> <span class="keyword">namespace</span> std;</span><br><span class="line"></span><br><span class="line"><span class="type">char</span> Firstroot[<span class="number">50</span>];</span><br><span class="line"><span class="type">char</span> Mediumroot[<span class="number">50</span>];</span><br><span class="line"></span><br><span class="line"><span class="keyword">typedef</span> <span class="keyword">struct</span> <span class="title class_">Tree</span>&#123;</span><br><span class="line">    <span class="type">char</span> data;</span><br><span class="line">    Tree *lch, *rch;</span><br><span class="line">&#125;Tree, *Bitree;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">Position</span><span class="params">(<span class="type">int</span> root, <span class="type">int</span> right, <span class="type">int</span> left)</span></span>;</span><br><span class="line"></span><br><span class="line"><span class="function">Bitree <span class="title">BuildTree</span><span class="params">(<span class="type">int</span> root, <span class="type">int</span> right, <span class="type">int</span> left)</span></span>&#123;</span><br><span class="line">    <span class="keyword">if</span>(left&lt;right)</span><br><span class="line">        <span class="keyword">return</span> <span class="literal">NULL</span>;</span><br><span class="line"></span><br><span class="line">    Bitree p=<span class="keyword">new</span> Tree;</span><br><span class="line">    p-&gt;data=Firstroot[root];</span><br><span class="line"></span><br><span class="line">    <span class="type">int</span> pos=<span class="built_in">Position</span>(root, right, left);</span><br><span class="line">    p-&gt;lch=<span class="built_in">BuildTree</span>(root+<span class="number">1</span>, right, pos<span class="number">-1</span>);</span><br><span class="line">    p-&gt;rch=<span class="built_in">BuildTree</span>(root+pos-right+<span class="number">1</span>, pos+<span class="number">1</span>, left);</span><br><span class="line">    <span class="keyword">return</span> p;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">Input</span><span class="params">()</span></span>&#123;</span><br><span class="line">    <span class="type">int</span> n;</span><br><span class="line">    cin&gt;&gt;n;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">for</span>(<span class="type">int</span> i=<span class="number">0</span>; i&lt;n; ++i)&#123;</span><br><span class="line">        cin&gt;&gt;Firstroot[i];</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">for</span>(<span class="type">int</span> i=<span class="number">0</span>; i&lt;n; ++i)&#123;</span><br><span class="line">        cin&gt;&gt;Mediumroot[i];</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span> n;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">Position</span><span class="params">(<span class="type">int</span> root, <span class="type">int</span> right, <span class="type">int</span> left)</span></span>&#123;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">for</span>(<span class="type">int</span> i=right; i&lt;=left; ++i)&#123;</span><br><span class="line">        <span class="keyword">if</span>(Mediumroot[i]==Firstroot[root])</span><br><span class="line">            <span class="keyword">return</span> i;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">Height</span><span class="params">(Bitree T)</span></span>&#123;</span><br><span class="line">    <span class="keyword">if</span>(T==<span class="literal">NULL</span>)</span><br><span class="line">        <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">    <span class="keyword">return</span> (<span class="built_in">Height</span>(T-&gt;lch) &gt; <span class="built_in">Height</span>(T-&gt;rch) ? <span class="built_in">Height</span>(T-&gt;lch)+<span class="number">1</span> : <span class="built_in">Height</span>(T-&gt;rch)+<span class="number">1</span>);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">main</span><span class="params">()</span></span>&#123;</span><br><span class="line">    <span class="type">int</span> n=<span class="built_in">Input</span>();</span><br><span class="line">    Bitree T=<span class="built_in">BuildTree</span>(<span class="number">0</span>, <span class="number">0</span>, n<span class="number">-1</span>);</span><br><span class="line">    <span class="type">int</span> height=<span class="built_in">Height</span>(T);</span><br><span class="line">    cout&lt;&lt;height;</span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br></pre></td></tr></table></figure>

<h2 id="实验三"><a href="#实验三" class="headerlink" title="实验三"></a>实验三</h2><blockquote>
<p>广度优先</p>
</blockquote>
<figure class="highlight c++"><table><tr><td class="code"><pre><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&quot;iostream&quot;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&quot;queue&quot;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&quot;cstdio&quot;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">define</span> MAX_VERTEX_NUM 100   <span class="comment">//最大顶点个数</span></span></span><br><span class="line"><span class="keyword">using</span> <span class="keyword">namespace</span> std;</span><br><span class="line"><span class="keyword">typedef</span> <span class="keyword">struct</span> <span class="title class_">ArcCell</span>&#123;</span><br><span class="line">    <span class="type">int</span> adj;</span><br><span class="line">&#125;ArcCell, AdjMatrix[MAX_VERTEX_NUM][MAX_VERTEX_NUM];</span><br><span class="line"><span class="keyword">typedef</span> <span class="keyword">struct</span>&#123;</span><br><span class="line">    AdjMatrix arcs;  <span class="comment">//弧的信息</span></span><br><span class="line">    <span class="type">int</span> vexnum, arcnum; <span class="comment">//顶点数，弧数</span></span><br><span class="line">&#125;MGraph;</span><br><span class="line"><span class="type">int</span> vex_six_num[MAX_VERTEX_NUM];</span><br><span class="line"><span class="function"><span class="type">void</span> <span class="title">Creatgraph</span><span class="params">(MGraph &amp;G)</span></span>&#123;</span><br><span class="line">    <span class="type">int</span> i, j, k;</span><br><span class="line">    cin&gt;&gt;G.vexnum&gt;&gt;G.arcnum;</span><br><span class="line">    <span class="keyword">for</span>(i=<span class="number">0</span>; i&lt;G.vexnum;++i)&#123;</span><br><span class="line">            <span class="keyword">for</span>(j=<span class="number">0</span>; j&lt;G.vexnum; ++j)&#123;</span><br><span class="line">                G.arcs[i][j].adj=<span class="number">0</span>;</span><br><span class="line">                G.arcs[j][i].adj=<span class="number">0</span>;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">    <span class="keyword">for</span>(k=<span class="number">0</span>; k&lt;G.arcnum; ++k)&#123;</span><br><span class="line">            cin&gt;&gt;i&gt;&gt;j;</span><br><span class="line">            G.arcs[i<span class="number">-1</span>][j<span class="number">-1</span>].adj=<span class="number">1</span>;</span><br><span class="line">            G.arcs[j<span class="number">-1</span>][i<span class="number">-1</span>].adj=<span class="number">1</span>;</span><br><span class="line">        &#125;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="type">void</span> <span class="title">BFSTraver</span><span class="params">(MGraph G, <span class="type">int</span> v)</span></span>&#123;</span><br><span class="line">    <span class="type">int</span> count=<span class="number">0</span>;</span><br><span class="line">    <span class="type">int</span> visited[G.vexnum];</span><br><span class="line">    <span class="keyword">for</span>(<span class="type">int</span> i=<span class="number">0</span>; i&lt;G.vexnum; ++i)&#123;</span><br><span class="line">            visited[i]=<span class="number">0</span>;</span><br><span class="line">        &#125;</span><br><span class="line">    queue&lt;<span class="type">int</span>&gt; Q;</span><br><span class="line">    visited[v]=<span class="number">1</span>;</span><br><span class="line">    Q.<span class="built_in">push</span>(v);</span><br><span class="line">            <span class="keyword">while</span>(!Q.<span class="built_in">empty</span>() &amp;&amp; count&lt;=<span class="number">6</span>)&#123;</span><br><span class="line">                <span class="type">int</span> num=Q.<span class="built_in">size</span>();</span><br><span class="line">                <span class="type">int</span> array[num];</span><br><span class="line"></span><br><span class="line">                vex_six_num[v] += num;</span><br><span class="line"></span><br><span class="line">                <span class="keyword">for</span>(<span class="type">int</span> i=<span class="number">0</span>; i&lt;num; ++i)&#123;</span><br><span class="line">                    array[i]=Q.<span class="built_in">front</span>();</span><br><span class="line">                    Q.<span class="built_in">pop</span>();</span><br><span class="line">                &#125;</span><br><span class="line">                <span class="keyword">for</span>(<span class="type">int</span> i=<span class="number">0</span>; i&lt;num; ++i)&#123;</span><br><span class="line">                    <span class="keyword">for</span>(<span class="type">int</span> w=<span class="number">0</span>; w&lt;G.vexnum; ++w)&#123;</span><br><span class="line">                        <span class="keyword">if</span>(G.arcs[w][array[i]].adj &amp;&amp; !visited[w])&#123;</span><br><span class="line">                            visited[w]=<span class="number">1</span>;</span><br><span class="line">                            Q.<span class="built_in">push</span>(w);</span><br><span class="line">                        &#125;</span><br><span class="line">                    &#125;</span><br><span class="line">                &#125;</span><br><span class="line">                ++count;</span><br><span class="line">            &#125;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">main</span><span class="params">()</span></span>&#123;</span><br><span class="line">    MGraph G;</span><br><span class="line">    <span class="built_in">Creatgraph</span>(G);</span><br><span class="line">    <span class="keyword">for</span>(<span class="type">int</span> i=<span class="number">0</span>; i&lt;G.vexnum; ++i)&#123;</span><br><span class="line">        vex_six_num[i]=<span class="number">0</span>;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">for</span>(<span class="type">int</span> i=<span class="number">0</span>; i&lt;G.vexnum; ++i)&#123;</span><br><span class="line">            <span class="built_in">BFSTraver</span>(G, i);</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">for</span>(<span class="type">int</span> i=<span class="number">0</span>; i&lt;G.vexnum; ++i)&#123;</span><br><span class="line">        <span class="built_in">printf</span>(<span class="string">&quot;%d:  %.2f%%\n&quot;</span>, i+<span class="number">1</span>, <span class="number">100</span>*(<span class="type">float</span>)vex_six_num[i]/G.vexnum);</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<h2 id="实验四"><a href="#实验四" class="headerlink" title="实验四"></a>实验四</h2><blockquote>

<figure class="highlight c++"><table><tr><td class="code"><pre><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">实验四---倒排索引</span></span><br><span class="line"><span class="comment">由单词确定文件位置</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&quot;iostream&quot;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&quot;cstdio&quot;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&quot;ctype.h&quot;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&quot;cstring&quot;</span></span></span><br><span class="line"><span class="keyword">using</span> <span class="keyword">namespace</span> std;</span><br><span class="line"></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">类似拉链法</span></span><br><span class="line"><span class="comment">文件链表结点结构</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="keyword">typedef</span> <span class="keyword">struct</span> <span class="title class_">File_node</span>&#123;</span><br><span class="line">    <span class="type">int</span> numbering;<span class="comment">//文件编号</span></span><br><span class="line">    File_node *next;</span><br><span class="line">&#125;File_node;</span><br><span class="line"></span><br><span class="line"><span class="comment">//word链表结点结构</span></span><br><span class="line"><span class="keyword">typedef</span> <span class="keyword">struct</span>  <span class="title class_">Word_node</span>&#123;</span><br><span class="line">    <span class="type">char</span> word[<span class="number">10 ne">            &#125;<span class="keyword">else</span>&#123;</span><br><span class="line">                <span class="keyword">for</span>(<span class="type">int</span> i= <span class="number">10</span>; i&gt;=<span class="number">0</span>; --i)&#123;</span><br><span class="line">                    word[i]=<span class="string">&#x27;\0&#x27;</span>;</span><br><span class="line">                &#125;</span><br><span class="line">                i=<span class="number">0</span>;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;<span class="comment">//while end</span></span><br><span class="line">        <span class="comment">//一个文件输入结束后，将m值放入File_word_num中</span></span><br><span class="line">        File_word_num[j]=m;</span><br><span class="line">        m=<span class="number">0</span>;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">void</span> <span class="title">FindAndRecording</span><span class="params">(<span class="type">int</span> first, <span class="type">int</span> second)</span></span>&#123;</span><br><span class="line">    <span class="type">int</span> find_file[<span class="number">2</span>];<span class="comment">//查询文件的编号</span></span><br><span class="line">    <span class="type">int</span> find_result[<span class="number">100</span>];</span><br><span class="line">    <span class="type">int</span> a=<span class="number">0</span>;</span><br><span class="line">    <span class="type">int</span> file_word_num[<span class="number">2</span>]=&#123;<span class="number">0</span>, <span class="number">0</span>&#125;;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">for</span>(<span class="type">int</span> i=<span class="number">0</span>; i&lt;<span class="number">100</span>; ++i)&#123;</span><br><span class="line">        find_result[i]=<span class="number" ><span class="function"><span class="type">int</span> <span class="title">main</span><span class="params">()</span></span>&#123;</span><br><span class="line">    <span class="keyword">for</span>(<span class="type">int</span> i=<span class="number">0</span>; i&lt;<span class="number">10</span>; ++i)&#123;</span><br><span class="line">        WORD[i].next=<span class="literal">NULL</span>;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="built_in">Input</span>();</span><br><span class="line">    <span class="type">int</span> n;</span><br><span class="line">    cin&gt;&gt;n;</span><br><span class="line">    <span class="type">int</span> find[n][<span class="number">2</span>];</span><br><span class="line">    <span class="keyword">for</span>(<span class="type">int</span> i=<span class="number">0</span>; i&lt;n; ++i)&#123;</span><br><span class="line">        <span class="type">int</span> m, y;</span><br><span class="line">        cin&gt;&gt;m&gt;&gt;y;</span><br><span class="line">        find[i][<span class="number">0</span>]=m<span class="number">-1</span>;</span><br><span class="line">        find[i][<span class="number">1</span>]=y<span class="number">-1</span>;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">for</span>(<span class="type">int</span> i=<span class="number">0</span>; i&lt;n; ++i)&#123;</span><br><span class="line">        <span class="built_in">FindAndRecording</span>(find[i][<span class="number">0</span>], find[i][<span class="number">1</span>]);</span><br><span class="line">    &#125;</span><br><span class="line">    cout&lt;&lt;endl;</span><br><span class="line">    <span class="built_in">Output</span>();</span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<figure class="highlight c++"><table><tr><td class="code"><pre><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&quot;iostream&quot;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&quot;string&quot;</span></span></span><br><span class="line"><span class="keyword">using</span> <span class="keyword">namespace</span> std;</span><br><span class="line"><span class="keyword">typedef</span> <span class="keyword">struct</span> <span class="title class_">SqList</span>&#123;</span><br><span class="line">    string student[<span class="number">3</span>][<span class="number">106</span>];</span><br><span class="line">&#125;SqList;</span><br><span class="line"><span class="keyword">class</span> <span class="title class_">Sort</span>&#123;</span><br><span class="line">    <span class="keyword">public</span>:</span><br><span class="line">    <span class="function"><span class="type">int</span> <span class="title">Partition</span><span class="params">(SqList &amp;L, <span class="type">int</span> low, <span class="type">int</span> high, <span class="type">int</span> tag)</span></span>&#123;</span><br><span class="line">        <span class="built_in">Swap</span>(L, <span class="number">0</span>, low);</span><br><span class="line">        <span class="built_in">Swap</span>(L, <span class="number">105</span>, low);</span><br><span class="line">        <span class="keyword">while</span>(low&lt;high) &#123;</span><br><span class="line">            <span class="keyword">while</span> (low &lt; high &amp;&amp; L.student[tag - <span class="number">1</span>][high].<span class="built_in">compare</span>(L.student[tag - <span class="number">1</span>][<span class="number">105</span>]) &gt;= <span class="number">0</span> ) &#123;</span><br><span class="line">                <span class="keyword">if</span>(L.student[tag - <span class="number">1</span>][high].<span class="built_in">compare</span>(L.student[tag - <span class="number">1</span>][<span class="number">105</span>]) == <span class="number">0</span>)&#123;</span><br><span class="line">                     <span class="keyword">if</span>(L.student[<span class="number">0</span>][high].<span class="built_in">compare</span>(L.student[<span class="number">0</span>][<span class="number">105</span>])&lt;<span class="number">0</span>)&#123;</span><br><span class="line">                         <span class="keyword">break</span>;</span><br><span class="line">                     &#125;</span><br><span class="line">                &#125;</span><br><span class="line">                --high;</span><br><span class="line">            &#125;</span><br><span class="line">            <span class="built_in">Swap</span>(L, low, high);</span><br><span class="line">            <span class="keyword">while</span> (low &lt; high &amp;&amp; L.student[tag - <span class="number">1</span>][low].<span class="built_in">compare</span>(L.student[tag - <span class="number">1</span>][<span class="number">105</span>]) &lt;= <span class="number">0</span> ) &#123;</span><br><span class="line">                <span class="keyword">if</span>(L.student[tag - <span class="number">1</span>][low].<span class="built_in">compare</span>(L.student[tag - <span class="number">1</span>][<span class="number">105</span>]) == <span class="number">0</span>)&#123;</span><br><span class="line">                    <span class="keyword">if</span>(L.student[<span class="number">0</span>][low].<span class="built_in">compare</span>(L.student[<span class="number">0</span>][<span class="number">105</span>])&gt;<span class="number">0</span>)&#123;</span><br><span class="line">                        <span class="keyword">break</span>;</span><br><span class="line">                    &#125;</span><br><span class="line">                &#125;</span><br><span class="line">                ++low;</span><br><span class="line">            &#125;</span><br><span class="line">            <span class="built_in">Swap</span>(L, high, low);</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="built_in">Swap</span>(L, low, <span class="number">0</span>);</span><br><span class="line">        <span class="keyword">return</span> low;  <span class="comment">//返回枢轴位置</span></span><br><span class="line">    &#125;</span><br><span class="line">    <span class="function"><span class="type">void</span> <span class="title">Swap</span><span class="params">(SqList &amp;L, <span class="type">int</span> m, <span class="type">int</span> n)</span></span>&#123;</span><br><span class="line">        L.student[<span class="number">0</span>][m].<span class="built_in">assign</span>(L.student[<span class="number">0</span>][n]);</span><br><span class="line">        L.student[<span class="number">1</span>][m].<span class="built_in">assign</span>(L.student[<span class="number">1</span>][n]);</span><br><span class="line">        L.student[<span class="number">2</span>][m].<span class="built_in">assign</span>(L.student[<span class="number">2</span>][n]);</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="function"><span class="type">void</span> <span class="title">QSort</span><span class="params">(SqList &amp;L, <span class="type">int</span> low, <span class="type">int</span> high, <span class="type">int</span> tag)</span></span>&#123;</span><br><span class="line">        <span class="type">int</span> pivotloc;</span><br><span class="line">        <span class="keyword">if</span>(low&lt;high)&#123;</span><br><span class="line">            pivotloc=<span class="built_in">Partition</span>(L, low, high, tag);</span><br><span class="line">            <span class="built_in">QSort</span>(L, low, pivotloc<span class="number">-1</span>, tag);</span><br><span class="line">            <span class="built_in">QSort</span>(L, pivotloc+<span class="number">1</span>, high, tag);</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;;</span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">main</span><span class="params">()</span></span>&#123;</span><br><span class="line">    <span class="type">int</span> n,tag;</span><br><span class="line">    cin&gt;&gt;n&gt;&gt;tag;</span><br><span class="line">    SqList L;</span><br><span class="line">    <span class="keyword">for</span>(<span class="type">int</span> i=<span class="number">1</span>; i&lt;=n; ++i)&#123;</span><br><span class="line">        cin&gt;&gt;L.student[<span class="number">0</span>][i]&gt;&gt;L.student[<span class="number">1</span>][i]&gt;&gt;L.student[<span class="number">2</span>][i];</span><br><span class="line">        <span class="keyword">if</span>(L.student[<span class="number">2</span>][i].<span class="built_in">compare</span>(<span class="string">&quot;100&quot;</span>)==<span class="number">0</span>)&#123;</span><br><span class="line">            L.student[<span class="number">2</span>][i].<span class="built_in">assign</span>(<span class="string">&quot;999&quot;</span>);</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">    Sort test;</span><br><span class="line">    test.<span class="built_in">QSort</span>(L, <span class="number">1</span>, n, tag);</span><br><span class="line">    <span class="keyword">for</span>(<span class="type">int</span> i=<span class="number">1</span>; i&lt;=n; ++i)&#123;</span><br><span class="line">        <span class="keyword">if</span>(L.student[<span class="number">2</span>][i].<span class="built_in">compare</span>(<span class="string">&quot;999&quot;</span>)==<span class="number">0</span>)&#123;</span><br><span class="line">            L.student[<span class="number">2</span>][i].<span class="built_in">assign</span>(<span class="string">&quot;100&quot;</span>);</span><br><span class="line">        &#125;</span><br><span class="line">        cout&lt;&lt;L.student[<span class="number">0</span>][i]&lt;&lt;<span class="string">&quot;\t&quot;</span>&lt;&lt;L.student[<span class="number">1</span>][i]&lt;&lt;<span class="string">&quot;\t&quot;</span>&lt;&lt;L.student[<span class="number">2</span>][i]&lt;&lt;endl;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>
